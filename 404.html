<!doctype html>
<html lang="en">
<head>
  <title>redirecting...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
          rel="icon"
          type="image/x-icon"
          href="https://github.com/fonseware/.github/blob/main/fw_favicon.png?raw=true"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
          href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;600&family=Geist:wght@600;800&display=swap"
          rel="stylesheet"
  />
  <style>
    /* background */
    body {
      font-family: "Cabin", system-ui, sans-serif;
      background: #000000;
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* fake message box */
    .modal {
      background: #cc99cc;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      text-align: center;
      max-width: 350px;
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    /* geist font for the title */
    h2 {
      font-family: "Geist", system-ui, sans-serif;
      margin-top: 0;
      color: #990099;
      font-size: 1.3rem;
      border-radius: 4px;
    }
    /* cabin font for the body */
    p {
      color: #000000;
      margin-bottom: 24px;
      font-size: 0.95rem;
      line-height: 1.4;
      border-radius: 4px;
    }

    /* styling for your image placeholder */
    .logo-placeholder {
      display: block;
      margin-top: 10px;
      pointer-events: none;
      border-radius: 8px;
      padding: 10px;
      height: 25px;
    }

    .link {
      color: #990099;
      text-decoration: underline;
      cursor: pointer;
      font-weight: bolder;
    }

    /* SLIDING SKELETON LOADING STYLES */
    .skeleton, .skeleton * {
      color: transparent !important;
      border-color: transparent !important;
      text-decoration-color: transparent !important; /* Hides the underline on links */
    }

    .skeleton {
      background: linear-gradient(90deg, #b380b3 25%, #e6b3e6 50%, #b380b3 75%);
      background-size: 200% 100%;
      animation: skeleton-slide 1.5s infinite linear;
      user-select: none;
      pointer-events: none;
    }

    /* Hide the actual image content while skeleton is active */
    img.skeleton {
      content: url('data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7');
    }

    @keyframes skeleton-slide {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
<div class="modal">
  <h2 class="skeleton" id="redirect-title">redirecting...</h2>
  <p class="skeleton">please wait while we redirect you to the destination page. if it does not or if you are in a hurry then click the link below.</p>
  <p class="skeleton"><a class="link" id="manual-link" href="https://fonseware.com">loading destination...</a></p>
  <a href="https://fonseware.com" style="display: inline-block">
    <img
            src="https://github.com/fonseware/.github/blob/main/fw_logo.png?raw=true"
            alt="fonseware logo"
            class="logo-placeholder skeleton"/></a>
</div>

<!-- Script moved to body so DOM elements exist when updating the link -->
<script>
  const fallbackURL = "https://fonseware.com";
  const redirectsFile = "./redirects.json";

  async function redirectUser() {
    const url = new URL(window.location.href);

    // Logic: Check for ?u= parameter first, otherwise check the path (like /vod)
    let key = url.searchParams.get("u") || url.pathname.slice(1);

    // Clean up: Remove trailing slash if it exists (e.g. "vod/" -> "vod")
    if (key && key.endsWith("/")) {
      key = key.slice(0, -1);
    }

    const titleEl = document.getElementById("redirect-title");
    const manualLinkEl = document.getElementById("manual-link");

    // Dynamically update the HTML title with the requested key
    if (key) {
      titleEl.textContent = `redirecting to "${key}"`;
    } else {
      titleEl.textContent = `redirecting to fonseware.com`;
      manualLinkEl.textContent = `in a hurry? click here to go to ${fallbackURL}`;
    }

    // If no key (just visiting fnswe.me), go to main website
    if (!key) {
      setTimeout(() => {
        window.location.replace(fallbackURL);
      }, 6000); // 6-second delay before redirecting
      return;
    }

    try {
      const res = await fetch(redirectsFile, { cache: "no-store" });
      const redirects = await res.json();

      const found = redirects.find(
              (item) => item.id.toLowerCase() === key.toLowerCase(),
      );

      if (found && found.url) {
        // Update the manual link href and text to show where it points
        manualLinkEl.href = found.url;
        manualLinkEl.textContent = `in a hurry? click here to go to ${found.url}`;

        setTimeout(() => {
          window.location.replace(found.url);
        }, 6000); // 6-second delay before redirecting
      } else {
        manualLinkEl.textContent = `"${key}" not found, click here to go to ${fallbackURL}`;
        titleEl.textContent = `uh. oh. destination "${key}" not found`;
        setTimeout(() => {
          //alert(`we cannot find where this url "${window.location.href}" was pointing to. but instead we will be redirecting to fonseware.com.`);
          //window.location.replace(fallbackURL);
        }, 6000); // 6-second delay before redirecting
      }
    } catch (err) {
      console.error("redirect error:", err);
      manualLinkEl.textContent = `error, pointing to ${fallbackURL}`;
      alert("hmm... something went wrong. redirecting to fonseware.com.");
      window.location.replace(fallbackURL);
    }
  }

  // Wait for external assets (fonts, images) to finish downloading, then remove skeleton
  window.addEventListener("load", () => {
    document.fonts.ready.then(() => {
      document.querySelectorAll('.skeleton').forEach(el => {
        el.classList.remove('skeleton');
        // Execute redirect logic
        redirectUser();
      });
    });
  });
</script>
</body>
</html>
