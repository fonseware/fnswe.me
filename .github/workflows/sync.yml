name: Sync index.html to 404.html

on:
  push:
    paths:
      - 'index.html'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy index.html to 404.html
        run: cp index.html 404.html

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add 404.html
          git diff --cached --quiet || git commit -m "auto: sync index.html to 404.html"

      - name: Push changes
        run: git push